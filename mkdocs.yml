site_name: App Docs
nav:
  - Home: index.md
  - How-to:
      - Overview: how-to/index.md
      - Development environment: how-to/dev-env.md
      - Testing: how-to/testing.md
      - CI/CD workflow: how-to/ci-cd.md
      - Release process: how-to/release-process.md
      - Documentation: how-to/documentation.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/app"]
theme:
  name: material
  features:
    tabs: true
  palette:
    # Note: Using the system theme works with the insiders version
    # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/#automatic-light-dark-mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: astral-light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: astral-dark
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
