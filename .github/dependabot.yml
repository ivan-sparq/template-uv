version: 2
updates:
  - package-ecosystem: pip
    target-branch: "develop"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    rebase-strategy: "disabled"
  - package-ecosystem: github-actions
    target-branch: "develop"
    directory: "/"
    schedule:
      interval: "weekly"
    rebase-strategy: "disabled"
